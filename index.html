<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    
    <style>
      #overlay {
        position: absolute; z-index: 1000; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="overlay" onclick="startAR()">
      <h1>Натисніть для старту AR та звуку</h1>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="duoModel" src="./scene_duo.gltf"></a-asset-item>
        <a-asset-item id="starModel" src="./scene_star.gltf"></a-asset-item>
        
        <audio id="miBombo" src="./mi-bombo-loud-af.mp3" preload="auto"></audio>
        <audio id="gtaSound" src="./rington-franklina-gta-5_Ij714i80.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ent1" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#duoModel" 
          rotation="0 0 0" 
          scale="0.05 0.05 0.05" 
          animation-mixer>
        </a-gltf-model>
        <a-entity id="s1" sound="src: #miBombo; positional: true; loop: true"></a-entity>
      </a-entity>

      <a-entity id="ent2" mindar-image-target="targetIndex: 1">
        <a-gltf-model 
          src="#starModel" 
          rotation="0 0 0" 
          scale="0.1 0.1 0.1" 
          animation-mixer>
        </a-gltf-model>
        <a-entity id="s2" sound="src: #gtaSound; positional: true; loop: true"></a-entity>
      </a-entity>

    </a-scene>

    <script>
      function startAR() {
        document.getElementById('overlay').style.display = 'none';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
      }

      // Обробка звуку при зчитуванні маркера
      const targets = [
        { marker: document.querySelector('#ent1'), sound: document.querySelector('#s1') },
        { marker: document.querySelector('#ent2'), sound: document.querySelector('#s2') }
      ];

      targets.forEach(t => {
        t.marker.addEventListener("targetFound", () => t.sound.components.sound.playSound());
        t.marker.addEventListener("targetLost", () => t.sound.components.sound.stopSound());
      });
    </script>
  </body>
</html>
