<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    
    <style>
      #overlay {
        position: absolute; z-index: 1000; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; cursor: pointer; text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="overlay" onclick="startAR()">
      <h1>Натисніть для запуску AR<br>(Активує анімацію та звук)</h1>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="duoModel" src="./duo.gltf"></a-asset-item>
        <a-asset-item id="starModel" src="./star.gltf"></a-asset-item>
        
        <audio id="audioDuo" src="./mi-bombo-loud-af.mp3" preload="auto"></audio>
        <audio id="audioStar" src="./rington-franklina-gta-5_Ij714i80.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target1" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#duoModel" 
          scale="0.05 0.05 0.05" 
          animation-mixer>
        </a-gltf-model>
        <a-entity id="sound1" sound="src: #audioDuo; positional: true; loop: true"></a-entity>
      </a-entity>

      <a-entity id="target2" mindar-image-target="targetIndex: 1">
        <a-gltf-model 
          src="#starModel" 
          scale="0.1 0.1 0.1" 
          animation-mixer>
        </a-gltf-model>
        <a-entity id="sound2" sound="src: #audioStar; positional: true; loop: true"></a-entity>
      </a-entity>

    </a-scene>

    <script>
      function startAR() {
        document.getElementById('overlay').style.display = 'none';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
      }

      const list = [
        { t: document.querySelector('#target1'), s: document.querySelector('#sound1') },
        { t: document.querySelector('#target2'), s: document.querySelector('#sound2') }
      ];

      list.forEach(item => {
        item.t.addEventListener("targetFound", () => {
          if (item.s.components.sound) item.s.components.sound.playSound();
        });
        item.t.addEventListener("targetLost", () => {
          if (item.s.components.sound) item.s.components.sound.stopSound();
        });
      });
    </script>
  </body>
</html>
