<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <title>AR Multi-Target Scene</title>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="huTaoModel" src="./duolingo.glb"></a-asset-item>
        <a-asset-item id="dragonModel" src="./starmie.glb"></a-asset-item>
        
        <audio id="miBombo" src="./mi-bombo-loud-af.mp3" response-type="arraybuffer"></audio>
        <audio id="gtaSound" src="./rington-franklina-gta-5_Ij714i80.mp3" response-type="arraybuffer"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#huTaoModel" 
          position="0 0 0" 
          scale="0.5 0.5 0.5" 
          rotation="0 0 0"
          animation-mixer>
        </a-gltf-model>
        <a-entity sound="src: #miBombo; autoplay: false; loop: true; positional: true; refDistance: 1; rolloffFactor: 5"></a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model 
          src="#dragonModel" 
          position="0 0 0" 
          scale="0.8 0.8 0.8" 
          rotation="0 0 0"
          animation-mixer>
        </a-gltf-model>
        <a-entity sound="src: #gtaSound; autoplay: false; loop: true; positional: true; refDistance: 1; rolloffFactor: 5"></a-entity>
      </a-entity>

    </a-scene>

    <script>
      // Скрипт для запуску звуку при виявленні маркера
      const entities = document.querySelectorAll('[mindar-image-target]');
      entities.forEach((el) => {
        el.addEventListener("targetFound", event => {
          console.log("Target found");
          el.querySelector('[sound]').components.sound.playSound();
        });
        el.addEventListener("targetLost", event => {
          console.log("Target lost");
          el.querySelector('[sound]').components.sound.pauseSound();
        });
      });
    </script>
  </body>
</html>
